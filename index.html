<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Will You Go On a Date With Me? 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #ff85a2;
      --soft-pink: #ffd6e0;
      --cream: #fff8f0;
      --coral: #ff6b8a;
      --lavender: #e8c1f4;
      --yellow: #ffd97d;
      --green: #b5ead7;
      --text: #5a3e4b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ========== FLOATING HEARTS BG ========== */
    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .heart-float {
      position: absolute;
      bottom: -60px;
      font-size: 1.5rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
    }

    /* ========== PAGES ========== */
    .page {
      display: none;
      position: relative;
      z-index: 1;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 0.6s ease;
    }
    .page.active { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ========== CARD ========== */
    .card {
      background: white;
      border-radius: 2rem;
      padding: 2.5rem 3rem;
      box-shadow: 0 8px 40px rgba(255,133,162,0.2);
      max-width: 560px;
      width: 100%;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 2.2rem;
      background: linear-gradient(135deg, var(--pink), var(--lavender), var(--yellow));
      z-index: -1;
    }

    /* ========== TYPOGRAPHY ========== */
    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 2.4rem;
      color: var(--coral);
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 1.05rem;
      color: #a07080;
      margin-bottom: 2rem;
    }
    .emoji-big { font-size: 3.5rem; margin-bottom: 1rem; display: block; animation: bounce 1.5s infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* ========== BUTTONS ========== */
    .btn-yes {
      background: linear-gradient(135deg, var(--pink), var(--coral));
      color: white;
      border: none;
      padding: 0.9rem 2.5rem;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(255,107,138,0.4);
      letter-spacing: 0.5px;
    }
    .btn-yes:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 25px rgba(255,107,138,0.5);
    }

    .btn-no {
      background: #e8e0e3;
      color: #b09090;
      border: none;
      padding: 0.9rem 2.5rem;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: default;
      transition: transform 0.3s ease;
      position: absolute;
      white-space: nowrap;
      user-select: none;
    }

    .btn-row {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      min-height: 60px;
      align-items: center;
    }

    /* ========== PAGE 2 - DESTINATION GRID ========== */
    .dest-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 1.5rem 0 2rem;
    }
    .dest-card {
      background: var(--soft-pink);
      border-radius: 1.2rem;
      padding: 1.2rem 0.8rem;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
      border: 2.5px solid transparent;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text);
    }
    .dest-card:hover {
      transform: translateY(-4px);
      background: var(--pink);
      color: white;
      box-shadow: 0 6px 20px rgba(255,133,162,0.4);
    }
    .dest-card.selected {
      background: var(--coral);
      color: white;
      border-color: #ff3a65;
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255,107,138,0.5);
    }
    .dest-card .dest-emoji { font-size: 2rem; display: block; margin-bottom: 0.4rem; }
    .btn-lets-go {
      background: linear-gradient(135deg, var(--coral), #ff4f80);
      color: white;
      border: none;
      padding: 0.9rem 2.8rem;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(255,107,138,0.4);
      opacity: 0.4;
      pointer-events: none;
    }
    .btn-lets-go.enabled {
      opacity: 1;
      pointer-events: all;
    }
    .btn-lets-go.enabled:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 25px rgba(255,107,138,0.6);
    }

    /* ========== PAGE 3 - ENDING ========== */
    .confetti-pop { animation: popIn 0.7s cubic-bezier(.36,1.6,.5,1) both; }
    @keyframes popIn {
      from { transform: scale(0) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .sticker-row { font-size: 2rem; letter-spacing: 0.5rem; margin: 1rem 0; }
    .selected-dest-display {
      background: linear-gradient(135deg, var(--soft-pink), var(--lavender));
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      margin: 1.2rem 0;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--coral);
    }
    .selected-dest-display span { font-size: 1.8rem; }
    .hearts-shower { font-size: 2rem; animation: spin 2s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ========== POLAROID STRIP ========== */
    .polaroid-strip {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }
    .polaroid {
      background: white;
      padding: 0.5rem 0.5rem 1.5rem;
      border-radius: 4px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
      transform: rotate(var(--r, -3deg));
      font-size: 2.2rem;
      line-height: 1;
      width: 65px;
      text-align: center;
      transition: transform 0.2s;
    }
    .polaroid:hover { transform: rotate(0deg) scale(1.1); }
  </style>
</head>
<body>

<!-- Floating hearts background -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- ===== PAGE 1: THE ASK ===== -->
<div class="page active" id="page1">
  <div class="card">
    <span class="emoji-big">🌸</span>
    <h1>Will you go on<br>a date with me?</h1>
    <p class="subtitle">Pretty please? 🥺</p>

    <div class="btn-row" id="btnRow">
      <button class="btn-yes" onclick="goToPage2()">Yes!! 💖</button>
      <button class="btn-no" id="noBtn" onmouseenter="runAway(this)">No 🙅</button>
    </div>
  </div>
</div>

<!-- ===== PAGE 2: DESTINATION ===== -->
<div class="page" id="page2">
  <div class="card">
    <span class="emoji-big" style="animation-delay:0.2s">📍</span>
    <h1>Pick our date spot!</h1>
    <p class="subtitle">Where should we go? 🗺️</p>

    <div class="dest-grid" id="destGrid">
      <!-- destinations injected by JS -->
    </div>

    <button class="btn-lets-go" id="letsGoBtn" onclick="goToPage3()">Let's go! 🚀</button>
  </div>
</div>

<!-- ===== PAGE 3: ENDING ===== -->
<div class="page" id="page3">
  <div class="card confetti-pop">
    <span class="emoji-big" style="font-size:4rem; animation:none;">🎉</span>
    <h1>Yay!! Can't wait!</h1>
    <p class="subtitle">Thank you for coming out with me 💕</p>

    <div class="selected-dest-display" id="destDisplay"></div>

    <div class="polaroid-strip">
      <div class="polaroid" style="--r: -4deg">📸</div>
      <div class="polaroid" style="--r: 2deg">🥰</div>
      <div class="polaroid" style="--r: -2deg">💑</div>
      <div class="polaroid" style="--r: 5deg">✨</div>
    </div>

    <p style="font-size:1rem; color:#a07080; margin-top: 0.5rem;">
      It's always the best day when I'm with you 🌷
    </p>
    <div class="sticker-row">🌸💖🌸💖🌸</div>
  </div>
</div>

<script>
  // ---- Floating hearts ----
  const heartsBg = document.getElementById('heartsBg');
  const heartChars = ['💖','💗','💕','🌸','✨','💝','🌷'];
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
    h.style.left = Math.random() * 100 + '%';
    h.style.fontSize = (Math.random() * 1.2 + 0.8) + 'rem';
    const dur = (Math.random() * 8 + 6) + 's';
    const delay = (Math.random() * 10) + 's';
    h.style.animation = `floatUp ${dur} ${delay} linear infinite`;
    heartsBg.appendChild(h);
  }

  // ---- No button runs away ----
  function runAway(btn) {
    const row = document.getElementById('btnRow');
    const rowRect = row.getBoundingClientRect();
    const maxX = rowRect.width - 120;
    const maxY = 80;
    const x = Math.floor(Math.random() * maxX) - maxX/2;
    const y = Math.floor(Math.random() * maxY) - 30;
    btn.style.transform = `translate(${x}px, ${y}px)`;
  }

  // ---- Destinations ----
  const destinations = [
    { emoji: '🛒', label: 'IKEA' },
    { emoji: '🎬', label: 'Movie' },
    { emoji: '👗', label: 'Thrifting' },
    { emoji: '☕', label: 'Café' },
    { emoji: '🎮', label: 'Gaming' },
    { emoji: '🌿', label: 'Park Walk' },
    { emoji: '🍜', label: 'Dinner Out' },
    { emoji: '🎨', label: 'Art Gallery' },
    { emoji: '🎳', label: 'Bowling' },
  ];

  let selectedDest = null;

  const grid = document.getElementById('destGrid');
  destinations.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'dest-card';
    el.innerHTML = `<span class="dest-emoji">${d.emoji}</span>${d.label}`;
    el.onclick = () => {
      document.querySelectorAll('.dest-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedDest = d;
      document.getElementById('letsGoBtn').classList.add('enabled');
    };
    grid.appendChild(el);
  });

  // ---- Page transitions ----
  function goToPage2() {
    document.getElementById('page1').classList.remove('active');
    document.getElementById('page2').classList.add('active');
  }

  function goToPage3() {
    if (!selectedDest) return;
    document.getElementById('destDisplay').innerHTML =
      `<span>${selectedDest.emoji}</span> We're going to <strong>${selectedDest.label}</strong>! <span>${selectedDest.emoji}</span>`;
    document.getElementById('page2').classList.remove('active');
    document.getElementById('page3').classList.add('active');
  }
</script>
</body>
</html>
