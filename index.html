<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Date? 🍭</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      color: #f7f7f5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ---- floating bits ---- */
    .floaters {
      position: fixed; inset:0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .floater {
      position: absolute;
      bottom: -60px;
      font-size: 1.4rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg);  opacity: 0.5; }
      100% { transform: translateY(-110vh) rotate(15deg); opacity: 0; }
    }

    /* ---- PAGES ---- */
    .page {
      display: none;
      position: relative;
      z-index: 1;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      animation: fadeIn 0.55s ease;
    }
    .page.active { display: flex; }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ========== PAGE 1 ========== */
    .p1-photos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 1.8rem;
    }
    .p1-photo {
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 3/4;
    }
    .p1-photo.tall { grid-row: span 2; aspect-ratio: unset; }
    .p1-photo img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: grayscale(100%) contrast(1.05);
      transition: filter 0.3s;
      display: block;
    }
    .p1-photo:hover img { filter: grayscale(30%) contrast(1.05); }

    .p1-text { text-align: center; margin-bottom: 1.8rem; }
    .p1-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem; font-weight: 900;
      line-height: 1.15; color: #f7f7f5;
      margin-bottom: 0.4rem;
    }
    .p1-text p { color: #c0b8b0; font-size: 1rem; font-weight: 300; }

    
    .btn-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      position: relative;
      min-height: 80px;
    }
    
    .btn-yes {
      background: #f7f7f5; color: #0a0a0a;
      border: none; padding: 0.85rem 2.8rem;
      border-radius: 50px; font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    .btn-yes:hover { transform: scale(1.06); background: #e0d8d0; }
    
    .btn-no {
      background: transparent;
      color: #e05555;
      border: 1.5px solid #553030;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.3s ease;
      user-select: none;
      position: relative;
    }
    

    /* ========== PAGE 2 ========== */
    #page2 { background: #0a0a0a; gap: 1.5rem; }
    .p2-header { text-align: center; }
    .p2-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem; color: #f7f7f5; margin-bottom: 0.4rem;
    }
    .p2-header p { color: #c0b8b0; font-size: 0.95rem; font-weight: 300; }

    .dest-scroll {
      display: flex; gap: 12px;
      overflow-x: auto; padding: 0.5rem 1rem;
      max-width: 100vw; scrollbar-width: none;
    }
    .dest-scroll::-webkit-scrollbar { display: none; }

    .dest-card {
      flex: 0 0 150px; height: 190px;
      border-radius: 12px; overflow: hidden;
      position: relative; cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }
    .dest-card img {
      width: 100%; height: 100%; object-fit: cover;
      filter: grayscale(100%) brightness(0.6);
      transition: filter 0.3s;
    }
    .dest-card:hover img { filter: grayscale(40%) brightness(0.75); }
    .dest-card.selected img { filter: grayscale(0%) brightness(0.85); }
    .dest-card.selected { border-color: #f7f7f5; transform: scale(1.04); }
    .dest-label {
      position: absolute; bottom:0; left:0; right:0;
      background: linear-gradient(transparent, rgba(0,0,0,0.88));
      color: #f7f7f5; font-weight: 600; font-size: 0.85rem;
      padding: 1rem 0.7rem 0.6rem; letter-spacing: 0.3px;
    }
    .dest-emoji-badge {
      position: absolute; top:8px; right:10px; font-size: 1.3rem;
    }

    .btn-letsgo {
      background: #f7f7f5; color: #0a0a0a;
      border: none; padding: 0.85rem 3rem;
      border-radius: 50px; font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      opacity: 0.3; pointer-events: none;
      transition: opacity 0.3s, transform 0.2s;
    }
    .btn-letsgo.enabled { opacity: 1; pointer-events: all; }
    .btn-letsgo.enabled:hover { transform: scale(1.06); }

    /* ========== PAGE 3 ========== */
    #page3 { background: #0a0a0a; }

    .p3-filmstrip {
      display: flex; gap: 8px; margin: 1.5rem 0;
      flex-wrap: wrap; justify-content: center; max-width: 420px;
    }
    .p3-frame {
      width: 110px; aspect-ratio: 3/4;
      border-radius: 8px; overflow: hidden;
      border: 2px solid #2a2520;
      animation: popIn 0.5s cubic-bezier(.36,1.6,.5,1) both;
    }
    .p3-frame:nth-child(1) { animation-delay:0.05s; transform: rotate(-3deg); }
    .p3-frame:nth-child(2) { animation-delay:0.15s; transform: rotate(2deg); }
    .p3-frame:nth-child(3) { animation-delay:0.25s; transform: rotate(-1.5deg); }
    .p3-frame img { width:100%; height:100%; object-fit:cover; filter:grayscale(20%); }
    @keyframes popIn {
      from { transform: scale(0.5); opacity:0; }
      to   { opacity:1; }
    }

    .p3-text { text-align:center; max-width:380px; }
    .p3-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem; color: #f7f7f5; margin-bottom: 0.5rem;
    }
    .p3-dest-reveal {
      background: #161412; border: 1px solid #2a2520;
      border-radius: 12px; padding: 0.9rem 2rem;
      margin: 1rem 0; font-size: 1.5rem;
      font-family: 'Playfair Display', serif; color: #f7f7f5;
    }
    .p3-sub { color: #c0b8b0; font-size: 1rem; font-weight: 300; margin: 0.5rem 0; }
    .p3-tag  { color: #6b6560; font-size: 0.9rem; font-weight: 300; letter-spacing: 0.3px; margin-top: 0.8rem; }
    .p3-emojis { font-size: 1.8rem; letter-spacing: 0.6rem; margin-top: 1.2rem; }
  
    @media (max-width: 768px) {
      .page {
        padding: 1rem 0.8rem 2rem;
      }

      .p1-photos {
        max-width: 100%;
        gap: 6px;
      }

      .p1-text h1 {
        font-size: 2rem;
      }

      
    .btn-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      position: relative;
      min-height: 80px;
    }
    

      
.btn-yes,
.btn-no {
  flex: 1;
  max-width: 150px;
}

.btn-no {
  position: relative !important;
  transition: transform 0.25s ease;
  will-change: transform;
}


@supports (-webkit-touch-callout: none) {
  body {
    min-height: -webkit-fill-available;
  }

  .page {
    min-height: -webkit-fill-available;
  }
}


@media (max-width: 768px) {

  #page1 {
    padding-top: 1rem;
    gap: 1rem;
  }

  .p1-photos {
    max-width: 280px !important;
    gap: 5px !important;
    margin-bottom: 1rem !important;
  }

  .p1-photo {
    border-radius: 8px;
  }

  .p1-photo.tall {
    max-height: 320px;
  }

  .p1-photo img {
    object-fit: cover;
  }

  .p1-text {
    position: relative;
    z-index: 5;
    margin-top: 0.5rem;
    margin-bottom: 1rem;
    padding: 0 0.5rem;
  }

  .p1-text h1 {
    font-size: 1.8rem !important;
    line-height: 1.2;
  }

  .p1-text p {
    font-size: 0.95rem;
  }

  .btn-row {
    position: relative;
    z-index: 5;
    margin-top: 0.5rem;
  }
}

</style>
</head>

  let selectedDest = null;
  const scroll = document.getElementById('destScroll');
  destinations.forEach(d => {
    const el = document.createElement('div');
    el.className = 'dest-card';
    el.innerHTML = `<img src="data:image/jpeg;base64,${d.img}" alt="${d.label}"/><div class="dest-label">${d.label}</div><div class="dest-emoji-badge">${d.emoji}</div>`;
    el.onclick = () => {
      document.querySelectorAll('.dest-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedDest = d;
      document.getElementById('letsGoBtn').classList.add('enabled');
    };
    scroll.appendChild(el);
  });

  function goToPage2() {
    document.getElementById('page1').classList.remove('active');
    document.getElementById('page2').classList.add('active');
  }
  function goToPage3() {
    if (!selectedDest) return;
    document.getElementById('destReveal').textContent = selectedDest.emoji + '  ' + selectedDest.label;
    document.getElementById('page2').classList.remove('active');
    document.getElementById('page3').classList.add('active');
  }
</script>




<script>
const noBtn = document.querySelector('.btn-no');

function moveNoButton() {
  const x = Math.floor(Math.random() * 140) - 70;
  const y = Math.floor(Math.random() * 50) - 25;

  noBtn.style.transform = `translate(${x}px, ${y}px)`;

  setTimeout(() => {
    noBtn.style.transform = 'translate(0px, 0px)';
  }, 500);
}

noBtn.addEventListener('mouseenter', moveNoButton);

noBtn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  moveNoButton();
}, { passive: false });
</script>
